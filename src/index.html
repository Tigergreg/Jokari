<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jokari Club Zürich — L'élégance du rebond</title>
  <meta name="description" content="Association sportive suisse à Horgen (ZH) qui promeut le Jokari, le jeu de raquette rétro de la côte basque." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lato:wght@300;400;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <section class="hero container">
    <div class="hero-meta">
      <span class="eyebrow" data-fr="Club sportif · Horgen, ZH · Fondé 2021" data-de="Sportverein · Horgen, ZH · Gegründet 2021"></span>
      <span class="eyebrow" data-fr="N° 5 · Saison de printemps 2026" data-de="N° 5 · Frühlingssaison 2026"></span>
    </div>
    <h1 class="hero-title" data-fr="L'art du rebond, entre amis, au bord du lac." data-de="Die Kunst des Rückpralls, unter Freunden, am Seeufer."></h1>
    <div class="hero-grid">
      <div style="aspect-ratio:16/8" id="hero-img"></div>
      <div>
        <p class="hero-lead" data-fr="Le Jokari Club Zürich rassemble les amateurs du jeu de raquette le plus convivial de la côte basque, exilé sur les rives du Zürichsee." data-de="Der Jokari Club Zürich vereint Liebhaber des charmantesten Schlägerspiels der baskischen Küste — ans Ufer des Zürichsees verpflanzt."></p>
        <div class="hero-cta">
          <a class="btn btn-primary" href="rejoindre.html" data-i18n="cta.join"></a>
          <a class="btn btn-ghost" href="jokari.html" data-i18n="cta.discover"></a>
        </div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="about-grid">
        <div>
          <span class="eyebrow eyebrow-red" data-fr="Notre manifeste" data-de="Unser Manifest"></span>
          <h2 class="section-title mt-2" data-fr="Une association,&#10;trois balles,&#10;beaucoup d'élégance." data-de="Ein Verein,&#10;drei Bälle,&#10;viel Eleganz."></h2>
          <p class="mt-3" style="font-size:17px;line-height:1.7;color:rgba(26,23,20,0.8);max-width:520px;" data-fr="Nous sommes une bande d'amoureux du Jokari — ce petit jeu inventé sur les plages basques en 1949 et qui consiste, en somme, à frapper une balle élastique tendue à un socle. Rien de plus simple. Rien de plus addictif." data-de="Wir sind eine Gruppe von Jokari-Verliebten — jenes Spiel, das 1949 an den baskischen Stränden erfunden wurde. Einfacher geht es nicht. Süchtiger auch nicht."></p>
          <p class="mt-2" style="font-size:17px;line-height:1.7;color:rgba(26,23,20,0.8);max-width:520px;" data-fr="Réunis chaque semaine sur les pelouses de Horgen, nous partageons des matchs amicaux, un verre de blanc bien frais et l'idée que le sport peut rester chic, lent et profondément joyeux." data-de="Jede Woche auf den Wiesen von Horgen teilen wir freundschaftliche Partien, einen kühlen Weisswein und die Idee, dass Sport stilvoll, langsam und freudig bleiben kann."></p>
          <a class="btn btn-ghost mt-4" href="jokari.html" data-fr="En savoir plus →" data-de="Mehr erfahren →"></a>
        </div>
        <div class="about-images">
          <div class="ph-tall" id="about-1"></div>
          <div class="ph-tall" id="about-2"></div>
          <div class="ph-wide" id="about-3"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="section-navy" style="padding:70px 0;">
    <div class="container">
      <div class="stats-grid">
        <div class="stat-item"><div class="stat-n">47</div><div class="stat-l" data-fr="Membres actifs" data-de="Aktivmitglieder"></div></div>
        <div class="stat-item"><div class="stat-n">3</div><div class="stat-l" data-fr="Tournois par an" data-de="Turniere pro Jahr"></div></div>
        <div class="stat-item"><div class="stat-n">5</div><div class="stat-l" data-fr="Ans d'existence" data-de="Jahre Bestehen"></div></div>
        <div class="stat-item"><div class="stat-n">23</div><div class="stat-l" data-fr="Balles perdues dans le lac" data-de="Im See verlorene Bälle"></div></div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="section-head">
        <div>
          <span class="eyebrow" data-fr="Saison 2026" data-de="Saison 2026"></span>
          <h2 class="section-title" data-fr="Prochains événements" data-de="Nächste Termine"></h2>
          <p class="section-lead mt-2" data-fr="Tournois, démonstrations et apéros au bord de l'eau." data-de="Turniere, Vorführungen und Apéros am Wasser."></p>
        </div>
        <a class="btn btn-ghost" href="evenements.html" data-i18n="cta.calendar"></a>
      </div>
      <div class="event-grid" id="home-events"></div>
    </div>
  </section>

  <section class="section section-cream">
    <div class="container">
      <div class="section-head">
        <div>
          <span class="eyebrow eyebrow-red" data-fr="Sur le tableau d'affichage" data-de="Am schwarzen Brett"></span>
          <h2 class="section-title" data-fr="Actualités du club" data-de="Aus dem Club"></h2>
          <p class="section-lead mt-2" data-fr="Résultats de tournois, décisions du bureau, photos du week-end." data-de="Turnierergebnisse, Vorstandsbeschlüsse, Wochenend-Bilder."></p>
        </div>
        <a class="btn btn-ghost" href="actualites.html" data-fr="Toutes les actualités →" data-de="Alle Beiträge →"></a>
      </div>
      <div class="news-grid" id="home-news"></div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="newsletter-strip">
        <div>
          <span class="eyebrow eyebrow-red" data-fr="Lettre saisonnière" data-de="Saisonbrief"></span>
          <h2 class="section-title" style="font-size:clamp(34px,4vw,52px);" data-fr="Quatre lettres par an,&#10;pas une de plus." data-de="Vier Briefe im Jahr,&#10;keiner mehr."></h2>
          <p class="mt-2" style="font-size:16px;line-height:1.6;color:var(--muted);max-width:480px;" data-fr="Quelques pages de Jokari, de musique, de cinéma et de bonne humeur. Désinscription en un clic." data-de="Einige Seiten Jokari, Musik, Kino und gute Laune. Abmeldung mit einem Klick."></p>
        </div>
        <form class="newsletter-card" id="home-newsletter">
          <div class="field">
            <label data-i18n="form.email"></label>
            <input type="email" name="email" required placeholder="vous@exemple.ch" />
          </div>
          <button type="submit" class="btn btn-primary" style="align-self:flex-start;" data-i18n="form.subscribe"></button>
          <div class="form-status" id="home-newsletter-status"></div>
        </form>
      </div>
    </div>
  </section>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const lang = (localStorage.getItem("jokari-lang") || "fr");
      document.getElementById("hero-img").innerHTML = ph({ variant: "navy", code: "HERO/01", label: lang==="fr"?"Match au crépuscule · Horgen":"Spiel in der Dämmerung", sun: true });
      document.getElementById("about-1").innerHTML = ph({ variant: "sand", code: "IMG/01", label: lang==="fr"?"Match du jeudi":"Donnerstagspiel" });
      document.getElementById("about-2").innerHTML = ph({ variant: "navy", code: "IMG/02", label: lang==="fr"?"Pelouse de Horgen":"Wiese Horgen", sun: true });
      document.getElementById("about-3").innerHTML = ph({ code: "IMG/03", label: lang==="fr"?"Apéro de fin d'été · 2025":"Sommer-Apéro · 2025" });

      // Events
      const grid = document.getElementById("home-events");
      window.JokariAPI.fetchEvents().then(res => {
        const list = (res.events || window.JokariAPI._mockEvents).slice(0,3);
        grid.innerHTML = list.map(ev => {
          const isFree = ev.price === 0;
          const title = lang === "fr" ? ev.title : ev.titleDe;
          const date = lang === "fr" ? ev.dateFr : ev.dateDe;
          const time = lang === "fr" ? ev.time : ev.timeDe;
          const desc = lang === "fr" ? ev.descFr : ev.descDe;
          const typeTag = lang === "fr" ? ev.type : ev.typeDe;
          return `
            <article class="card">
              <div class="event-thumb"><a href="evenement.html?id=${ev.id}">${ph({ variant: isFree?"sand":"navy", code: "EVT/"+ev.id.slice(0,3).toUpperCase(), label: ev.location, sun: !isFree })}</a></div>
              <div class="event-body">
                <div class="event-tags">
                  <span class="tag ${isFree?"tag-navy":"tag-red"}">${typeTag}</span>
                </div>
                <h3 class="event-title"><a href="evenement.html?id=${ev.id}">${title}</a></h3>
                <div class="event-meta"><span>${date} · ${time}</span><span>${ev.location}</span></div>
                <p class="event-desc">${desc}</p>
                <div class="event-foot">
                  <span class="event-price">${isFree?(lang==="fr"?"Gratuit":"Gratis"):ev.price+" CHF"}</span>
                  <a class="btn ${isFree?"btn-ghost":"btn-navy"}" style="padding:9px 16px;font-size:13px;" href="evenements.html#${ev.id}">${lang==="fr"?"M'inscrire":"Anmelden"} →</a>
                </div>
              </div>
            </article>`;
        }).join("");
      });

      // News
      const newsGrid = document.getElementById("home-news");
      const newsCatLabel = {
        fr: { results: "Résultats", announcement: "Annonce", press: "Presse" },
        de: { results: "Ergebnisse", announcement: "Mitteilung", press: "Presse" },
      };
      window.JokariAPI.fetchNews().then(res => {
        const list = (res.news || window.JokariAPI._mockNews).slice(0, 3);
        newsGrid.innerHTML = list.map((n, i) => {
          const title = lang === "fr" ? n.title : n.titleDe;
          const date = lang === "fr" ? n.dateFr : n.dateDe;
          const excerpt = lang === "fr" ? n.excerptFr : n.excerptDe;
          const cat = (newsCatLabel[lang] || newsCatLabel.fr)[n.category] || n.category;
          const featured = i === 0;
          return `
            <a href="actualite.html?id=${n.id}" class="news-card ${featured?"featured":""}">
              <div class="news-card-img">${ph({ variant: n.cover || "navy", code: "NWS/"+(i+1).toString().padStart(2,"0"), label: n.coverLabel || title, sun: n.cover==="navy" || n.cover==="sand" })}</div>
              <div class="news-card-body">
                <div class="news-meta">
                  <span class="news-cat">${cat}</span>
                  <span>${date}</span>
                </div>
                <h3>${title}</h3>
                <p>${excerpt}</p>
                <span class="news-card-link">${lang==="fr"?"Lire":"Lesen"} →</span>
              </div>
            </a>`;
        }).join("");
      });

      const nf = document.getElementById("home-newsletter");
      nf.addEventListener("submit", e => {
        e.preventDefault();
        submitForm(nf, document.getElementById("home-newsletter-status"),
          d => window.JokariAPI.subscribeNewsletter(d), "form.success.newsletter");
      });
    });
  </script>
</body>
</html>
