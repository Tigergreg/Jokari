<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Boutique — Jokari Club Zürich</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lato:wght@300;400;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <section style="padding:80px 0 40px;">
    <div class="container">
      <span class="eyebrow eyebrow-red" data-fr="La petite boutique du club" data-de="Der kleine Clubshop"></span>
      <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:50px;align-items:end;margin-top:20px;">
        <h1 class="hero-title" style="font-size:clamp(46px,7vw,96px);" data-fr="Deux pièces,&#10;faites pour&#10;être portées." data-de="Zwei Stücke,&#10;zum Tragen&#10;gemacht."></h1>
        <p style="font-size:17px;line-height:1.7;color:rgba(26,23,20,0.8);max-width:420px;" data-fr="Le club a fait imprimer deux pièces simples pour ses membres et leurs amis. Le reste — raquettes, balles, sacs — arrive plus tard dans l'année." data-de="Der Club hat zwei einfache Stücke drucken lassen, für Mitglieder und Freunde. Der Rest — Schläger, Bälle, Taschen — folgt später im Jahr."></p>
      </div>
    </div>
  </section>

  <section style="padding:30px 0 70px;">
    <div class="container">
      <span class="eyebrow" data-fr="Disponible maintenant" data-de="Jetzt verfügbar"></span>
      <div class="shop-now">

        <article>
          <div style="aspect-ratio:4/3;" id="prod-tee"></div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:22px;gap:18px;">
            <h2 style="font-family:var(--serif);font-size:34px;letter-spacing:-0.01em;margin:0;" data-fr="T-shirt club" data-de="Club-T-Shirt"></h2>
            <span style="font-family:var(--mono);font-size:17px;letter-spacing:0.04em;">38 CHF</span>
          </div>
          <div style="font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:8px;" data-fr="Marine · broderie poitrine · coton bio" data-de="Marineblau · Bruststickerei · Bio-Baumwolle"></div>
          <p style="font-size:15px;line-height:1.65;color:rgba(26,23,20,0.85);margin-top:18px;max-width:46ch;" data-fr="Coupe droite, manches courtes, écusson du club brodé au fil rouge. Disponible en S, M, L, XL. Compté en trois lavages pour devenir le préféré de l'été." data-de="Gerader Schnitt, kurze Ärmel, Clubwappen rot gestickt. Erhältlich in S, M, L, XL. Nach drei Wäschen ist es das Lieblings-T-Shirt des Sommers."></p>
          <a class="btn btn-primary" style="margin-top:24px;" href="mailto:contact@jokari.ch?subject=Commande%20T-shirt%20club&body=Bonjour%2C%20je%20souhaite%20commander%20un%20T-shirt%20club.%20Taille%20%3A%20...%20Adresse%20de%20livraison%20%3A%20..." data-fr="Commander par e-mail" data-de="Per E-Mail bestellen"></a>
        </article>

        <article>
          <div style="aspect-ratio:4/3;" id="prod-tote"></div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:22px;gap:18px;">
            <h2 style="font-family:var(--serif);font-size:34px;letter-spacing:-0.01em;margin:0;" data-fr="Tote bag en lin" data-de="Leinen-Tote"></h2>
            <span style="font-family:var(--mono);font-size:17px;letter-spacing:0.04em;">28 CHF</span>
          </div>
          <div style="font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:8px;" data-fr="Lin écru · sérigraphie main · Bayonne" data-de="Naturleinen · Handsiebdruck · Bayonne"></div>
          <p style="font-size:15px;line-height:1.65;color:rgba(26,23,20,0.85);margin-top:18px;max-width:46ch;" data-fr="Lin lourd, anses solides, sérigraphie « JKR · ZRH » imprimée à la main par un atelier de Bayonne. Pour les balles, le rosé et le livre du dimanche." data-de="Schweres Leinen, robuste Henkel, Handsiebdruck «JKR · ZRH» aus einem Atelier in Bayonne. Für Bälle, Rosé und das Sonntagsbuch."></p>
          <a class="btn btn-primary" style="margin-top:24px;" href="mailto:contact@jokari.ch?subject=Commande%20Tote%20bag&body=Bonjour%2C%20je%20souhaite%20commander%20un%20tote%20bag.%20Adresse%20de%20livraison%20%3A%20..." data-fr="Commander par e-mail" data-de="Per E-Mail bestellen"></a>
        </article>

      </div>
    </div>
  </section>

  <section class="section-cream" style="padding:70px 0;">
    <div class="container">
      <div class="section-head">
        <div>
          <span class="eyebrow eyebrow-red" data-fr="Pour plus tard cette année" data-de="Später dieses Jahr"></span>
          <h2 class="section-title" style="font-size:clamp(32px,4vw,52px);" data-fr="Bientôt disponible." data-de="Bald verfügbar."></h2>
          <p class="section-lead mt-2" data-fr="Trois pièces en préparation avec notre partenaire Jokari Originals à Bayonne. Réservation sur liste d'attente par e-mail." data-de="Drei Stücke in Vorbereitung mit unserem Partner Jokari Originals in Bayonne. Vormerkung per E-Mail."></p>
        </div>
      </div>

      <div class="shop-soon">
        <div class="shop-soon-card">
          <span class="soon-tag" data-fr="Été 2026" data-de="Sommer 2026"></span>
          <h4 data-fr="Le Jokari du club" data-de="Das Club-Jokari"></h4>
          <p data-fr="Set complet — socle en hêtre, élastique latex, deux raquettes peintes aux couleurs du club. Édition numérotée, soixante exemplaires." data-de="Komplettes Set — Buchensockel, Latexgummi, zwei Schläger in Clubfarben. Nummerierte Ausgabe, sechzig Exemplare."></p>
        </div>
        <div class="shop-soon-card">
          <span class="soon-tag" data-fr="Été 2026" data-de="Sommer 2026"></span>
          <h4 data-fr="Casquette en lin" data-de="Leinen-Cap"></h4>
          <p data-fr="Six pans, lin écru, écusson brodé. Coupe légère pour les après-midi au bord du lac, et un trou de boutonnière pour la passer à la ceinture." data-de="Sechsteilig, Naturleinen, gesticktes Wappen. Leichter Schnitt für Nachmittage am See."></p>
        </div>
        <div class="shop-soon-card">
          <span class="soon-tag" data-fr="Automne 2026" data-de="Herbst 2026"></span>
          <h4 data-fr="Carnet de matchs" data-de="Match-Notizbuch"></h4>
          <p data-fr="Petit carnet relié pour tenir le compte de ses scores, ses partenaires, ses excuses. Imprimé à Lausanne, papier ivoire." data-de="Kleines, gebundenes Notizbuch für Spielstände, Partner, Ausreden. In Lausanne gedruckt, elfenbeinfarbenes Papier."></p>
        </div>
      </div>

      <div style="margin-top:36px;display:flex;justify-content:center;">
        <a class="btn btn-navy" href="mailto:contact@jokari.ch?subject=Liste%20d%27attente%20boutique&body=Bonjour%2C%20je%20souhaite%20%C3%AAtre%20pr%C3%A9venu%28e%29%20de%20la%20sortie%20des%20prochaines%20pi%C3%A8ces.%20Article%28s%29%20qui%20m%27int%C3%A9resse%28nt%29%20%3A%20..." data-fr="M'inscrire sur la liste d'attente →" data-de="Auf die Warteliste →"></a>
      </div>
    </div>
  </section>

  <section class="section-navy" style="padding:60px 0;">
    <div class="container" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px;">
      <div>
        <span class="eyebrow eyebrow-cream" data-fr="Notre partenaire" data-de="Unser Partner"></span>
        <h3 style="font-family:var(--serif);font-style:italic;font-size:clamp(26px,3vw,40px);letter-spacing:-0.01em;color:var(--sand);margin-top:14px;" data-fr="Pour les vraies raquettes, on vous renvoie à Jokari Originals." data-de="Für echte Schläger verweisen wir auf Jokari Originals."></h3>
        <p style="font-size:14px;color:rgba(245,240,232,0.78);margin-top:12px;max-width:560px;" data-fr="Atelier à Bayonne, fabrication à la main, code MEMBRE-ZRH pour 15% de remise." data-de="Atelier in Bayonne, handgefertigt, Code MEMBRE-ZRH für 15% Rabatt."></p>
      </div>
      <a class="btn btn-cream" href="https://jokari.fr" target="_blank" rel="noreferrer" data-fr="Visiter jokari.fr ↗" data-de="Zu jokari.fr ↗"></a>
    </div>
  </section>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const lang = (localStorage.getItem("jokari-lang") || "fr");
      document.getElementById("prod-tee").innerHTML = ph({ variant:"navy", code:"BTQ/01", label: lang==="fr"?"T-shirt marine":"T-Shirt marineblau", sun:true });
      document.getElementById("prod-tote").innerHTML = ph({ variant:"sand", code:"BTQ/02", label: lang==="fr"?"Tote lin écru":"Tote Naturleinen" });
    });
  </script>
</body>
</html>
