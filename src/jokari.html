<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Le Jokari — Jokari Club Zürich</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lato:wght@300;400;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <section style="background:var(--sand);padding:80px 0 60px;">
    <div class="container">
      <span class="eyebrow eyebrow-red" data-fr="Le jeu" data-de="Das Spiel"></span>
      <div style="display:grid;grid-template-columns:1.3fr 1fr;gap:50px;align-items:end;margin-top:20px;" class="head-grid">
        <h1 class="hero-title" data-fr="Le Jokari, ou&#10;l'élégance du rebond." data-de="Jokari, oder&#10;die Eleganz des Rückpralls."></h1>
        <p style="font-size:17px;line-height:1.7;color:rgba(26,23,20,0.8);max-width:420px;" data-fr="Trois balles, un socle, et soixante-quinze ans d'histoire. Ce qu'il faut savoir avant de prendre une raquette." data-de="Drei Bälle, ein Sockel und 75 Jahre Geschichte. Was Sie vor dem Schläger wissen sollten."></p>
      </div>
    </div>
  </section>

  <section>
    <div class="container">
      <div style="aspect-ratio:21/9;" id="hero-archive"></div>
    </div>
  </section>

  <section class="section">
    <div class="container-narrow">
      <span class="eyebrow" data-fr="Une histoire de plage" data-de="Eine Strandgeschichte"></span>
      <h2 class="section-title" style="font-size:clamp(32px,4vw,52px);">Biarritz, 1949.</h2>
      <div class="history-cols">
        <p class="dropcap" data-fr="Le Jokari fut inventé en 1949 par Jean Dorigny, un industriel français installé à Biarritz. Sur la promenade de la Grande Plage, il observe les baigneurs s'ennuyer entre deux bains, et bricole un petit dispositif : un socle de plomb, un long élastique, une balle de caoutchouc, deux raquettes de bois." data-de="Jokari wurde 1949 von Jean Dorigny erfunden, einem französischen Industriellen aus Biarritz. Auf der Promenade beobachtete er gelangweilte Badegäste und bastelte eine kleine Vorrichtung: Bleisockel, Gummiband, Gummiball, zwei Holzschläger."></p>
        <p data-fr="Le succès est immédiat. Toute la côte basque s'y met, puis la France entière. Les années 60 voient des tournois sur les plages de Biarritz, Saint-Jean-de-Luz, Hossegor. Le jeu décline avec l'arrivée du tennis de masse, mais son charme rétro lui vaut aujourd'hui un retour très chic." data-de="Der Erfolg war unmittelbar. Die ganze baskische Küste, dann ganz Frankreich übernahm es. In den 60ern Turniere an den Stränden von Biarritz, Saint-Jean-de-Luz, Hossegor. Das Spiel verlor mit dem Massentennis an Bedeutung, doch sein Retro-Charme verleiht ihm eine schicke Rückkehr."></p>
      </div>
    </div>
  </section>

  <section class="section-navy" style="padding:100px 0;">
    <div class="container">
      <div style="display:grid;grid-template-columns:1fr 1.4fr;gap:70px;align-items:start;" class="rules-head">
        <div>
          <span class="eyebrow eyebrow-red" data-fr="Comment ça marche" data-de="So funktioniert's"></span>
          <h2 class="section-title" data-fr="Quatre règles,&#10;ça suffit." data-de="Vier Regeln,&#10;das genügt."></h2>
          <p class="mt-3" style="font-size:16px;line-height:1.7;opacity:0.8;" data-fr="Le Jokari ne se complique pas. C'est ce qui le rend irrésistible." data-de="Jokari macht es sich nicht kompliziert. Genau das macht es unwiderstehlich."></p>
        </div>
        <div>
          <svg viewBox="0 0 600 360" style="width:100%;height:auto;">
            <line x1="40" y1="300" x2="560" y2="300" stroke="rgba(245,240,232,0.4)" stroke-dasharray="3 4" />
            <rect x="280" y="290" width="40" height="14" fill="#F5F0E8" />
            <text x="300" y="325" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(245,240,232,0.6)" letter-spacing="1.5">SOCLE</text>
            <path d="M 300 290 Q 360 200 420 130" stroke="#C0392B" stroke-width="1.5" fill="none" stroke-dasharray="2 3" />
            <circle cx="420" cy="130" r="9" fill="#C0392B" />
            <text x="438" y="134" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(245,240,232,0.6)">BALLE</text>
            <g transform="translate(120 180) rotate(-20)">
              <ellipse cx="0" cy="0" rx="34" ry="42" fill="none" stroke="#F5F0E8" stroke-width="2" />
              <line x1="0" y1="40" x2="0" y2="80" stroke="#F5F0E8" stroke-width="3" stroke-linecap="round" />
              <line x1="-30" y1="-10" x2="30" y2="-10" stroke="#F5F0E8" stroke-width="0.7" />
              <line x1="-30" y1="10" x2="30" y2="10" stroke="#F5F0E8" stroke-width="0.7" />
              <line x1="-15" y1="-40" x2="-15" y2="40" stroke="#F5F0E8" stroke-width="0.7" />
              <line x1="15" y1="-40" x2="15" y2="40" stroke="#F5F0E8" stroke-width="0.7" />
            </g>
            <text x="120" y="295" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="rgba(245,240,232,0.6)">JOUEUR</text>
            <path d="M 145 165 Q 280 80 415 128" stroke="rgba(245,240,232,0.45)" stroke-width="0.8" fill="none" stroke-dasharray="1 4" />
            <text x="280" y="50" text-anchor="middle" font-family="Playfair Display, serif" font-style="italic" font-size="22" fill="#F5F0E8">l'art du rebond</text>
          </svg>
        </div>
      </div>
      <div class="rules-grid">
        <div class="rule-card">
          <span class="rule-num">01</span>
          <h4 class="rule-title" data-fr="Le matériel" data-de="Material"></h4>
          <p class="rule-body" data-fr="Un socle lesté, un élastique tendu, une balle mousse, deux raquettes en bois." data-de="Ein beschwerter Sockel, ein Gummiband, ein Schaumball, zwei Holzschläger."></p>
        </div>
        <div class="rule-card">
          <span class="rule-num">02</span>
          <h4 class="rule-title" data-fr="Le geste" data-de="Die Geste"></h4>
          <p class="rule-body" data-fr="Frapper la balle pour qu'elle revienne. Tout est dans le rythme et la précision." data-de="Den Ball treffen, damit er zurückkommt. Alles eine Frage von Rhythmus und Präzision."></p>
        </div>
        <div class="rule-card">
          <span class="rule-num">03</span>
          <h4 class="rule-title" data-fr="À deux" data-de="Zu zweit"></h4>
          <p class="rule-body" data-fr="On joue en alternance, comme un duo de danse. Enchaîner le plus longtemps possible." data-de="Im Wechsel spielen, wie ein Tanzduo. Möglichst lange schlagen."></p>
        </div>
        <div class="rule-card">
          <span class="rule-num">04</span>
          <h4 class="rule-title" data-fr="Le terrain" data-de="Das Feld"></h4>
          <p class="rule-body" data-fr="Une pelouse, du sable, ou un balcon zurichois. Le Jokari ne demande rien — sauf un peu d'espace." data-de="Eine Wiese, Sand oder ein Zürcher Balkon. Jokari verlangt nichts — ausser etwas Platz."></p>
        </div>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="section-head">
        <div>
          <span class="eyebrow" data-fr="Galerie" data-de="Galerie"></span>
          <h2 class="section-title" data-fr="Une saison&#10;au bord du lac." data-de="Eine Saison&#10;am Seeufer."></h2>
        </div>
        <p class="section-lead" data-fr="Photos de membres, archives et clichés glanés sur les rives du Zürichsee." data-de="Mitglieder-Fotos, Archive und Schnappschüsse vom Zürichsee."></p>
      </div>
      <div class="gallery">
        <div class="g-1" id="g1"></div>
        <div class="g-2" id="g2"></div>
        <div class="g-3" id="g3"></div>
        <div class="g-4" id="g4"></div>
        <div class="g-5" id="g5"></div>
        <div class="g-6" id="g6"></div>
        <div class="g-7" id="g7"></div>
        <div class="g-8" id="g8"></div>
      </div>
    </div>
  </section>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("hero-archive").innerHTML = ph({ variant:"navy", code:"HIST/01", label:"Biarritz, 1953 · archives", sun:true });
      const labels = [
        ["sand","GAL/01","Open Zürich · 2024",true],
        ["",    "GAL/02","Apéro de mai",false],
        ["red", "GAL/03","Raquettes",false],
        ["navy","GAL/04","Lac",false],
        ["",    "GAL/05","Finale 2025",false],
        ["sand","GAL/06","Le bureau, en réunion",true],
        ["navy","GAL/07","Coucher de soleil",false],
        ["",    "GAL/08","Coupe Biarritz",false],
      ];
      labels.forEach((l,i) => {
        document.getElementById("g"+(i+1)).innerHTML = ph({variant:l[0], code:l[1], label:l[2], sun:l[3]});
      });
    });
  </script>
</body>
</html>
