<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rejoindre — Jokari Club Zürich</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Lato:wght@300;400;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <section style="padding:80px 0 50px;">
    <div class="container">
      <span class="eyebrow eyebrow-red" data-fr="Adhésion gratuite" data-de="Gratis-Mitgliedschaft"></span>
      <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:50px;align-items:end;margin-top:20px;">
        <h1 class="hero-title" data-fr="Rejoignez le club." data-de="Werden Sie Mitglied."></h1>
        <p style="font-size:17px;line-height:1.7;color:rgba(26,23,20,0.8);max-width:420px;" data-fr="Trois statuts, une seule famille. L'adhésion est gratuite — nous existons grâce à nos membres bienfaiteurs et à la cotisation symbolique des tournois." data-de="Drei Statuten, eine Familie. Die Mitgliedschaft ist gratis — wir leben dank Förderern und symbolischen Turniergebühren."></p>
      </div>
    </div>
  </section>

  <section style="padding:40px 0 100px;">
    <div class="container-narrow">
      <form id="member-form" style="display:flex;flex-direction:column;gap:46px;">

        <div>
          <h2 style="font-size:28px;letter-spacing:-0.01em;" data-fr="Type d'adhésion" data-de="Mitgliedsart"></h2>
          <div class="radio-group" style="margin-top:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
            <label class="radio-card">
              <input type="radio" name="memberType" value="actif" checked required />
              <span class="radio-card-label" data-fr="Membre actif" data-de="Aktivmitglied"></span>
              <span class="radio-card-meta" data-fr="0 CHF · Participation aux tournois" data-de="0 CHF · Turnierteilnahme"></span>
              <span class="radio-card-desc" data-fr="Vous jouez, vous venez, vous prenez part à la vie du club. Accès à tous les événements et aux pelouses réservées du jeudi soir." data-de="Sie spielen, kommen, beteiligen sich. Zugang zu allen Veranstaltungen und reservierten Wiesen donnerstags."></span>
            </label>
            <label class="radio-card">
              <input type="radio" name="memberType" value="bienfaiteur" />
              <span class="radio-card-label" data-fr="Membre bienfaiteur" data-de="Förderer"></span>
              <span class="radio-card-meta" data-fr="Don libre · Soutien moral et matériel" data-de="Freie Spende · Unterstützung"></span>
              <span class="radio-card-desc" data-fr="Vous aimez le Jokari, sans nécessairement jouer. Vous soutenez l'association par un don libre et recevez la lettre saisonnière." data-de="Sie lieben Jokari, ohne unbedingt zu spielen. Sie unterstützen mit einer freien Spende und erhalten den Saisonbrief."></span>
            </label>
            <label class="radio-card">
              <input type="radio" name="memberType" value="honoraire" />
              <span class="radio-card-label" data-fr="Membre honoraire" data-de="Ehrenmitglied"></span>
              <span class="radio-card-meta" data-fr="Sur invitation · À vie" data-de="Auf Einladung · Auf Lebenszeit"></span>
              <span class="radio-card-desc" data-fr="Réservé aux personnalités ayant rendu d'éminents services au club. Statut accordé en assemblée générale." data-de="Personen, die dem Verein bedeutende Dienste geleistet haben. Statut durch Mitgliederversammlung verliehen."></span>
            </label>
          </div>
        </div>

        <div>
          <h2 style="font-size:28px;letter-spacing:-0.01em;" data-fr="Informations personnelles" data-de="Persönliche Angaben"></h2>
          <div style="display:flex;flex-direction:column;gap:18px;margin-top:20px;">
            <div class="field-row">
              <div class="field"><label data-fr="Prénom" data-de="Vorname"></label><input name="firstName" required /></div>
              <div class="field"><label data-fr="Nom" data-de="Nachname"></label><input name="lastName" required /></div>
            </div>
            <div class="field-row">
              <div class="field"><label data-fr="Email" data-de="E-Mail"></label><input name="email" type="email" required /></div>
              <div class="field"><label data-fr="Téléphone" data-de="Telefon"></label><input name="phone" type="tel" /></div>
            </div>
            <div class="field"><label data-fr="Adresse" data-de="Adresse"></label><input name="address" required /></div>
            <div class="field-row">
              <div class="field"><label data-fr="NPA" data-de="PLZ"></label><input name="zip" required /></div>
              <div class="field"><label data-fr="Ville" data-de="Stadt"></label><input name="city" value="Zürich" required /></div>
            </div>
            <div class="field"><label data-fr="Date de naissance" data-de="Geburtsdatum"></label><input name="birthDate" type="date" required /></div>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:12px;">
          <label class="checkbox-row">
            <input type="checkbox" name="acceptStatuts" required />
            <span data-fr="J'ai lu et j'accepte les statuts de l'association." data-de="Ich habe die Statuten gelesen und akzeptiere sie."></span>
          </label>
          <label class="checkbox-row">
            <input type="checkbox" name="acceptNewsletter" checked />
            <span data-fr="Je souhaite recevoir la lettre saisonnière." data-de="Ich möchte den Saisonbrief erhalten."></span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary" style="align-self:flex-start;padding:15px 28px;" data-fr="Envoyer ma demande →" data-de="Antrag senden →"></button>
        <div class="form-status" id="member-status"></div>
      </form>
    </div>
  </section>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const f = document.getElementById("member-form");
      f.addEventListener("submit", e => {
        e.preventDefault();
        submitForm(f, document.getElementById("member-status"),
          d => window.JokariAPI.submitMember(d), "form.success.member");
      });
    });
  </script>
</body>
</html>
